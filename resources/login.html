<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#f5f6fa; display:flex; justify-content:center; align-items:center; height:100vh; }
.card { padding:20px; width:350px; }
</style>
</head>
<body>

<div class="card shadow">
  <h4 class="mb-3 text-center">Admin Login</h4>

  <div id="errorMsg" class="text-danger mb-2" style="display:none;"></div>

  <div class="mb-3">
    <label class="form-label">Username</label>
    <input type="text" class="form-control" id="username">
  </div>

  <div class="mb-3">
    <label class="form-label">Password</label>
    <input type="password" class="form-control" id="password">
  </div>

  <button class="btn btn-primary w-100" id="loginBtn">Se connecter</button>
</div>

<script>
document.getElementById("loginBtn").addEventListener("click", async () => {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorDiv = document.getElementById("errorMsg");

  if(!username || !password){
    errorDiv.style.display="block";
    errorDiv.textContent = "Veuillez remplir tous les champs";
    return;
  }

  try {
    // Envoi du login au backend via chemin relatif pour fonctionner dans tous les environnements
    const res = await fetch("/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if(!res.ok){
      throw data.message || "Erreur login";
    }

    // Sauvegarde du token dans localStorage
    localStorage.setItem("access_token", data.access_token);

    // Redirection vers admin dashboard
    window.location.href = "/compteadmin";

  } catch(e){
    console.error(e);
    errorDiv.style.display="block";
    errorDiv.textContent = e || "Erreur connexion";
  }
});
</script>

</body>
</html>
