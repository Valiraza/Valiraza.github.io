<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="reservation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playwrite+CZ:wght@100..400&family=Playwrite+NO:wght@100..400&display=swap" rel="stylesheet">
    <title>Details</title>
    
</head>
<body>
  <section id="about" class="about-section">
  <div class="container">
   <div class="form-container">
    <!-- Step bar -->
    <div class="step-bar">
      <div class="step active">1</div>
      <div class="step">2</div>
      <div class="step">3</div>
    </div>

    <!-- Form -->
    <form id="reservationForm">
      <!-- Step 1 -->
      <div class="form-step active">
        <h3>Informations personnelles</h3>
        <input type="text" placeholder="Nom complet" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Téléphone" required>
        <button type="button" class="next-btn">Suivant</button>
      </div>

      <!-- Step 2 -->
      <div class="form-step">
        <h3>Détails du séjour</h3>
        <label for="date" class="form-label">Date de depart</label>
        <input type="date" placeholder="Date d'arrivée" required>
        <label for="date" class="form-label">Date d'arrivée</label>
        <input type="date" placeholder="Date de départ" required>
        <select required>
          <option value="">Type de séjour</option>
          <option value="randonnée">Randonnée</option>
          <option value="séjour">Séjour organisé</option>
          <option value="classe verte">Classe verte</option>
          <option value="team building">Team building</option>
        </select>
        <label for="date" class="form-label">Choisissez votre place</label>
<div class="res-card" id="app">

<form method="POST">

    <div class="input-group mb-3">
        <input type="text" class="form-control" placeholder="Choisir..." readonly :value="selectedSeats.join(', ')" >
        <button type="button" class="btn btn-primary" @click="showBus=!showBus"><i class="bi bi-grid-fill"></i></button>
    </div>

    <div class="bus-container" v-show="showBus">
        <div class="overlay" v-if="showBus" @click.self="showBus = false">
          <div class="bus-modal">
            <span class="close-btn" @click="showBus = false">&times;</span>

            <h5 class="text-center mb-3">Choix des places</h5>

            <div class="bus-container">
              <div class="row-seats">
              <div class="seat chauffeur" title="Chauffeur">C</div>
              <div class="front-ring">
                <div class="seat" v-for="n in 2" :key="'front-'+n" :class="seatClass(n)" @click="toggleSeat(n)">{{ n }}</div>
              </div>
          </div>
          <div class="row-seats" v-for="r in 6" :key="'row-'+r">
              <div class="left-side">
                  <div class="seat" v-for="c in 2" :key="'l-'+((r-1)*5+c+2)" :class="seatClass((r-1)*5+c+2)" @click="toggleSeat((r-1)*5+c+2)">{{ (r-1)*5+c+2 }}</div>
              </div>
              <div class="couloir"></div>
              <div class="right-side">
                  <div class="seat" v-for="c in 3" :key="'r-'+((r-1)*5+c+4)" :class="seatClass((r-1)*5+c+4)" @click="toggleSeat((r-1)*5+c+4)">{{ (r-1)*5+c+4 }}</div>
              </div>
            </div>
                  <div class="text-center mt-3">
                    <button class="btn btn-success" 
                            :disabled="selectedSeats.length === 0"
                            @click="submitSeats">
                    Valider
                    </button>
                </div>
            </div>
          </div>
        </div>
    </div>
    
    <input type="hidden" name="seat" :value="selectedSeats.join(',')">

</form>

</div>

   
        <button type="button" class="prev-btn">Précédent</button>
        <button type="button" class="next-btn">Suivant</button>
      </div>

      <!-- Step 3 -->
      <div class="form-step">
        <h3>Confirmation</h3>
        <p>Vérifiez vos informations avant de valider.</p>
        <button type="button" class="prev-btn">Précédent</button>
        <button type="submit" class="submit-btn">Réserver</button>
      </div>
    </form>
  </div>

                </div>
            </div>
        </div>
        </section>
  
</body>

    <script src="pagedetail.js" defer></script>
    <script src="js/vue.global.prod.js"></script>
    </html>
